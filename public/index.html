<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>梦境画卷 · Dreamscape</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@200;300;400;500;700&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Long+Cang&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Grain texture overlay -->
  <div class="grain"></div>

  <!-- INPUT PHASE -->
  <div id="input-phase" class="phase active">
    <!-- Background orbs (pure CSS) -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="container">
      <div class="dream-icon">
        <svg viewBox="0 0 64 64" fill="none">
          <circle cx="26" cy="32" r="18" stroke="rgba(120,100,60,.4)" stroke-width="1"/>
          <circle cx="36" cy="26" r="14" fill="#edeae4" stroke="rgba(120,100,60,.3)" stroke-width="1"/>
          <circle cx="14" cy="14" r="1.5" fill="rgba(120,100,60,.25)"/>
          <circle cx="52" cy="40" r="1" fill="rgba(120,100,60,.2)"/>
          <circle cx="48" cy="12" r="1.2" fill="rgba(120,100,60,.15)"/>
          <circle cx="10" cy="46" r="0.8" fill="rgba(120,100,60,.12)"/>
        </svg>
      </div>
      <h1>梦境画卷</h1>
      <p class="subtitle">DREAMSCAPE</p>
      <div class="title-line"></div>
      <p class="description">
        讲述你的梦，AI 为你绘出每一帧画面<br>
        <small>Describe your dream — AI paints every scene</small>
      </p>
      <p class="style-label">选择画风 · Visual Style</p>
      <div class="style-selector">
        <button class="style-btn selected" data-style="watercolor">水彩 Watercolor</button>
        <button class="style-btn" data-style="dreamcore">梦核 Dreamcore</button>
        <button class="style-btn" data-style="pixel">像素 Pixel Art</button>
        <button class="style-btn" data-style="ghibli">吉卜力 Ghibli</button>
        <button class="style-btn" data-style="ukiyoe">浮世绘 Ukiyo-e</button>
        <button class="style-btn" data-style="cyberpunk">赛博 Cyberpunk</button>
        <button class="style-btn" data-style="clay">黏土 Claymation</button>
      </div>
      <textarea id="dream-input" rows="3" placeholder=""></textarea>
      <div class="btn-row">
        <button id="begin-btn" disabled>入梦 · Dream</button>
      </div>
      <button id="btn-explore" onclick="showBoard()" style="margin-top:12px;background:none;border:none;color:#9a9088;font-family:'Cormorant Garamond',serif;font-size:.78rem;cursor:pointer;letter-spacing:.08em;transition:color .3s;text-decoration:underline;text-underline-offset:3px;"></button>
      <p class="footer-note">Imagen 4.0 · Gemini AI</p>
    </div>
    <button id="lang-switch" style="position:absolute;top:24px;right:24px;z-index:10;background:rgba(255,255,255,.3);border:1px solid rgba(140,130,110,.15);border-radius:20px;padding:6px 18px;color:#8a8278;font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.1em;cursor:pointer;transition:all .4s;backdrop-filter:blur(4px);" onclick="switchLang()">EN</button>
  </div>

  <!-- LOADING PHASE -->
  <div id="loading-phase" class="phase">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <!-- Drifting particles -->
    <div class="loading-particles" id="loading-particles"></div>
    <button id="loading-back-btn" style="position:absolute;top:24px;left:24px;z-index:10;background:none;border:1px solid rgba(140,130,110,.15);border-radius:20px;padding:6px 16px;color:#888;font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.08em;cursor:pointer;transition:all .4s;backdrop-filter:blur(4px);">← 返回 Back</button>
    <div style="text-align:center;position:relative;z-index:2;">
      <div style="position:relative;width:110px;height:110px;margin:0 auto 28px;animation:float 4s ease-in-out infinite;">
        <svg viewBox="0 0 110 110" style="width:100%;height:100%;">
          <circle cx="55" cy="55" r="48" fill="none" stroke="rgba(160,140,100,.15)" stroke-width="1"/>
          <circle id="loading-ring" cx="55" cy="55" r="48" fill="none"
            stroke="rgba(160,130,80,.6)" stroke-width="2"
            stroke-dasharray="302" stroke-dashoffset="302"
            stroke-linecap="round" transform="rotate(-90 55 55)"/>
          <circle cx="55" cy="55" r="6" fill="rgba(160,140,100,.08)" style="animation:pulse 3s ease-in-out infinite;"/>
        </svg>
        <div id="loading-pct" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.85rem;color:rgba(120,100,60,.65);letter-spacing:.05em;"></div>
      </div>
      <p id="loading-step" style="font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:#5a4838;letter-spacing:.12em;">坠入梦境…</p>
      <p id="loading-detail" style="font-family:'Cormorant Garamond',serif;font-size:.75rem;color:#9a8a78;font-style:italic;letter-spacing:.15em;margin-top:12px;">falling into the dream…</p>
    </div>
  </div>

  <!-- BOARD PHASE -->
  <div id="board-phase" class="phase" style="min-height:100vh;flex-direction:column;background:linear-gradient(180deg,#edeae4 0%,#e4e0d8 40%,#ddd8cf 100%);padding:0;">
    <div style="max-width:900px;width:100%;margin:0 auto;padding:24px 20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <h2 id="board-title" style="font-family:'Ma Shan Zheng','Cormorant Garamond',serif;font-size:1.6rem;color:#3a3a3a;letter-spacing:.08em;"></h2>
        <button id="board-back" style="background:none;border:1px solid rgba(140,130,110,.2);border-radius:20px;padding:6px 16px;color:#8a8278;font-family:'Cormorant Garamond',serif;font-size:.72rem;cursor:pointer;transition:all .3s;">← </button>
      </div>
      <div id="board-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;"></div>
      <div id="board-load-more" style="text-align:center;margin-top:20px;display:none;">
        <button id="btn-load-more" class="style-btn" style="padding:10px 28px;"></button>
      </div>
      <p id="board-empty" style="display:none;text-align:center;color:#aaa;font-family:'Cormorant Garamond',serif;font-size:.9rem;margin-top:40px;font-style:italic;"></p>
    </div>
  </div>

  <!-- CINEMATIC PHASE -->
  <div id="cinematic-phase" class="phase" style="min-height:100vh;flex-direction:column;position:relative;background:#0a0a08;">
    <div id="cinema-screen" style="position:fixed;inset:0;overflow:hidden;">
      <!-- Blurred background fill (covers edges when image doesn't match screen ratio) -->
      <div id="cinema-bg-a" style="position:absolute;inset:-20px;background-size:cover;background-position:center;opacity:0;filter:blur(30px) brightness(.6);transition:opacity 2s ease;"></div>
      <div id="cinema-bg-b" style="position:absolute;inset:-20px;background-size:cover;background-position:center;opacity:0;filter:blur(30px) brightness(.6);transition:opacity 2s ease;"></div>
      <!-- Main images (contain = full image visible) -->
      <div id="cinema-img-a" style="position:absolute;inset:0;background-size:contain;background-position:center;background-repeat:no-repeat;opacity:0;transition:opacity 2s ease,transform 10s linear;"></div>
      <div id="cinema-img-b" style="position:absolute;inset:0;background-size:contain;background-position:center;background-repeat:no-repeat;opacity:0;transition:opacity 2s ease,transform 10s linear;"></div>
      <canvas id="brush-canvas" style="position:absolute;inset:0;z-index:3;pointer-events:none;"></canvas>
      <div id="cinema-transition" style="position:absolute;inset:0;background:#0a0a08;opacity:0;transition:opacity 1.5s ease;z-index:5;pointer-events:none;"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,8,.7) 0%,rgba(10,10,8,.05) 40%,rgba(10,10,8,.1) 100%);z-index:4;"></div>
      <div id="cinema-title" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;opacity:0;transition:opacity 2s ease;z-index:10;">
        <h1 id="cinema-title-text" style="font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:400;color:#e8e0d4;letter-spacing:.12em;"></h1>
        <p style="font-family:'Cormorant Garamond',serif;font-size:.78rem;color:rgba(232,224,212,.4);letter-spacing:.28em;font-style:italic;">A DREAM VISUALIZED</p>
      </div>
      <div id="cinema-text" style="position:absolute;bottom:clamp(100px,15vh,160px);left:clamp(30px,6vw,80px);right:clamp(30px,6vw,80px);max-width:600px;z-index:10;"></div>
      <div id="scene-counter" style="position:absolute;top:28px;right:32px;font-family:'Cormorant Garamond',serif;font-size:.72rem;color:rgba(232,224,212,.5);letter-spacing:.15em;z-index:20;"></div>
    </div>

    <!-- Controls -->
    <div style="position:fixed;bottom:0;left:0;right:0;z-index:50;padding:0 0 24px;display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div id="progress-bar-container" style="width:min(80%,600px);height:2px;background:rgba(232,224,212,.15);border-radius:1px;cursor:pointer;position:relative;">
        <div id="progress-bar-fill" style="height:100%;width:0%;background:rgba(232,224,212,.4);border-radius:1px;transition:width .3s;"></div>
        <div id="progress-dots" style="position:absolute;top:-4px;left:0;right:0;height:10px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;"></div>
      </div>
      <div style="display:flex;gap:24px;align-items:center;">
        <button id="ctrl-prev" class="ctrl-btn" title="Previous" aria-label="Previous scene">&#x2039;</button>
        <button id="ctrl-play" class="ctrl-btn" title="Play/Pause" aria-label="Pause" style="font-size:.7rem;">&#10074;&#10074;</button>
        <button id="ctrl-next" class="ctrl-btn" title="Next" aria-label="Next scene">&#x203a;</button>
      </div>
    </div>

    <!-- End screen -->
    <div id="cinema-end" style="position:fixed;inset:0;display:none;flex-direction:column;background:rgba(10,10,8,.97);z-index:60;overflow-y:auto;">
      <div style="min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px;">
        <p id="end-title" style="font-family:'Ma Shan Zheng','Cormorant Garamond',serif;font-size:clamp(2.2rem,6vw,3.2rem);color:#e8e0d4;letter-spacing:.12em;margin-bottom:8px;"></p>
        <p id="end-subtitle" style="font-family:'Cormorant Garamond',serif;font-size:clamp(.85rem,1.5vw,1.05rem);font-weight:300;font-style:italic;color:rgba(232,224,212,.5);letter-spacing:.06em;margin-bottom:20px;">— 梦醒了，画还在 —</p>
        <!-- Poster preview -->
        <div id="poster-preview" style="width:min(90%,420px);margin-bottom:20px;">
          <img id="poster-img" style="width:100%;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.4);" alt="Dream poster">
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;">
          <button id="btn-interpret" class="end-btn">解梦 · INTERPRET</button>
          <button id="btn-share" class="end-btn">保存海报 · SAVE</button>
          <button id="btn-share-link" class="end-btn">分享链接 · SHARE</button>
          <button id="btn-restart" class="end-btn">再做一个梦 · DREAM AGAIN</button>
        </div>
        <p id="share-status" style="margin-top:10px;font-family:'Cormorant Garamond',serif;font-size:.76rem;color:rgba(232,224,212,.5);display:none;"></p>
        <button id="btn-tip" style="margin-top:16px;background:none;border:none;color:rgba(232,224,212,.45);font-family:'Cormorant Garamond',serif;font-size:.82rem;cursor:pointer;letter-spacing:.08em;transition:color .3s;"></button>
        <a id="bug-report" href="https://github.com/tweetyone/dreamscape/issues" target="_blank" style="display:block;margin-top:10px;color:rgba(232,224,212,.35);font-family:'Cormorant Garamond',serif;font-size:.74rem;letter-spacing:.06em;text-decoration:none;transition:color .3s;"></a>

        <!-- Tip modal -->
        <div id="tip-modal" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;">
          <div style="max-width:400px;width:100%;padding:32px 24px;background:#1a1a18;border:1px solid rgba(232,224,212,.1);border-radius:20px;text-align:center;position:relative;">
            <button id="tip-close" style="position:absolute;top:12px;right:16px;background:none;border:none;color:rgba(232,224,212,.4);font-size:1.2rem;cursor:pointer;">&times;</button>
            <p id="tip-title" style="font-family:'Cormorant Garamond',serif;font-size:1rem;color:rgba(232,224,212,.7);margin-bottom:8px;"></p>
            <p id="tip-subtitle" style="font-family:'Cormorant Garamond',serif;font-size:.72rem;color:rgba(232,224,212,.3);margin-bottom:20px;font-style:italic;"></p>
            <div style="display:flex;gap:16px;justify-content:center;">
              <div style="flex:1;text-align:center;">
                <img src="/wechat-pay.jpg" style="width:100%;max-width:160px;border-radius:10px;" alt="WeChat Pay">
                <p style="font-family:'Cormorant Garamond',serif;font-size:.68rem;color:rgba(232,224,212,.35);margin-top:8px;">微信 WeChat</p>
              </div>
              <div style="flex:1;text-align:center;">
                <img src="/alipay.jpg" style="width:100%;max-width:160px;border-radius:10px;" alt="Alipay">
                <p style="font-family:'Cormorant Garamond',serif;font-size:.68rem;color:rgba(232,224,212,.35);margin-top:8px;">支付宝 Alipay</p>
              </div>
            </div>
          </div>
        </div>
      <!-- Dream interpretation panel -->
      <div id="interpret-panel" style="display:none;max-width:560px;width:90%;margin-top:8px;padding:28px 32px;background:rgba(232,224,212,.05);border:1px solid rgba(232,224,212,.08);border-radius:16px;backdrop-filter:blur(8px);">
        <p id="interpret-text" style="font-family:'Cormorant Garamond','Noto Serif SC',serif;font-size:.92rem;line-height:2.2;color:rgba(232,224,212,.7);"></p>
      </div>
      <!-- Debug: prompt editor (toggle with D key) -->
      <div id="debug-panel" style="display:none;max-width:680px;width:95%;margin-top:12px;">
        <textarea id="debug-prompt" style="width:100%;height:200px;padding:16px;background:rgba(232,224,212,.06);border:1px solid rgba(232,224,212,.1);border-radius:12px;color:rgba(232,224,212,.8);font-family:monospace;font-size:.75rem;line-height:1.6;resize:vertical;outline:none;"></textarea>
        <div style="display:flex;gap:10px;margin-top:8px;justify-content:center;">
          <button id="debug-run" class="end-btn" style="font-size:.7rem;padding:8px 20px;">Run Prompt</button>
          <button id="debug-reset" class="end-btn" style="font-size:.7rem;padding:8px 20px;">Reset Default</button>
        </div>
      </div>
    </div>
  </div>


  <script src="/i18n.js"></script>
  <script src="/app.js"></script>
  <script>applyLanguage();</script>
</body>
</html>
